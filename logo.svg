<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37"/>
      <stop offset="50%" stop-color="#F0D060"/>
      <stop offset="100%" stop-color="#D4AF37"/>
    </linearGradient>
    <linearGradient id="goldShine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D4AF37" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#F0D060" stop-opacity="1"/>
      <stop offset="100%" stop-color="#D4AF37" stop-opacity="0.6"/>
    </linearGradient>
  </defs>

  <!-- Decorative diamond/crown element -->
  <g transform="translate(200, 18)">
    <polygon points="0,-14 14,0 7,14 -7,14 -14,0" fill="url(#goldGrad)" opacity="0.8"/>
    <polygon points="0,-7 7,0 3.5,7 -3.5,7 -7,0" fill="none" stroke="#F0D060" stroke-width="0.5" opacity="0.4"/>
  </g>

  <!-- Main title: CENTURY -->
  <text x="200" y="68" text-anchor="middle" font-family="'Playfair Display', 'Georgia', 'Times New Roman', serif" font-size="38" font-weight="700" fill="url(#goldShine)" letter-spacing="6">CENTURY</text>

  <!-- Divider line -->
  <line x1="90" y1="80" x2="310" y2="80" stroke="url(#goldShine)" stroke-width="1" opacity="0.5"/>

  <!-- Subtitle: CLEAN GROUP -->
  <text x="200" y="102" text-anchor="middle" font-family="'Montserrat', 'Arial', sans-serif" font-size="16" font-weight="600" fill="#c6c6ca" letter-spacing="10">CLEAN GROUP</text>
</svg>
